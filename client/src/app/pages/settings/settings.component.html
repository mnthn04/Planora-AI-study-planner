<div class="settings-container">
    <header class="header">
        <h1>Settings</h1>
        <p class="subtitle">Manage your account and preferences</p>
    </header>

    <div class="settings-card">
        <div class="card-section">
            <h3>Profile Information</h3>
            <p class="section-desc">Update your name and view your registered email.</p>

            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" [(ngModel)]="userName" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" [value]="userEmail" disabled class="disabled-input">
                <small>Email address cannot be changed.</small>
            </div>

            @if (message) {
            <div class="alert" [class.error]="isError">
                {{ message }}
            </div>
            }

            <div class="actions">
                <button class="save-btn" (click)="saveProfile()" [disabled]="loading">
                    {{ loading ? 'Saving...' : 'Save Changes' }}
                </button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="card-section">
            <h3>Account Actions</h3>
            <p class="section-desc">Sign out of your account.</p>
            <button class="logout-btn" (click)="authService.logout()">Sign Out</button>
        </div>
    </div>
</div>
