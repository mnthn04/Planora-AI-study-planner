version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: planora-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  backend:
    build:
      context: .
      dockerfile: src/AIStudyPlanner.API/Dockerfile
    container_name: planora-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=PlanoraDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Jwt__Key=a_very_long_and_secure_secret_key_at_least_32_chars
      - Jwt__Issuer=Planora
      - Jwt__Audience=Planora
    depends_on:
      - sqlserver

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: planora-ui
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  mssql_data:
